<html>
    <head>
         <link rel="stylesheet" href="practical18b.css">
        
        <title>Practical 18</title>
    </head>
    <body>
        <div class="header">
            <h4>Debajit Paul</h4>
            <p>This is the practical solution for practical 18.</p>
        </div>

        <div class="regform">
                <fieldset>
                    <legend>Registration Form</legend>
                    <form action="practical18.html">
                        <p>
                            <label for="name">Username</label>
                            <input type="text" name="name" id="name" placeholder="Enter Username" onclick="return validation()" required>
                        </p>
                        <p>
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email" onclick="return validation()" required>
                        </p>
                        <p>
                            <label for="dob">Date of Birth</label>
                            <input type="date" name="dob" id="dob" onclick="return validation()" required>
                        </p>
                        <p>
                            <label for="phno">Phone Number</label>
                            <input type="tel" id="number" placeholder="Enter your phone number " onclick="return validation()" required>
                        </p>
                        <p>
                            <label for="age">Age</label>
                            <input type="number" id="age" onclick="return validation()" required>
                        </p>
                        <p>
                            <label for="gender" required>Gender</label>
                            <input type="radio" name="gender" id="male">Male
                            <input type="radio" name="gender" id="female">Female
                        </p>
                        <p>
                            <label for="address">Address</label>
                            <textarea name="address" id="address" required placeholder="Enter your address" onclick="return validation()"></textarea>
                        </p>
                        <p>
                            <label for="hobbies">Hobbies</label>
                            <input type="checkbox" name="hobbies" id="basketball">Basketball
                            <input type="checkbox" name="hobbies" id="football">Football
                            <input type="checkbox" name="hobbies" id="swimming">Swimming
                            <input type="checkbox" name="hobbies" id="trekking">Trekking
                        </p>
                        <p>
                            <label for="state">State</label>
                            <select name="state" id="state" required>
                                <option value="assam">Assam</option>
                                <option value="meghalaya">Meghalaya</option>
                                <option value="manipur">Manipur</option>
                            </select>
                        </p>
                        <p>
                            <label for="password">Password</label>
                            <input type="password" name="password" id="password" onclick="return validation()" required>
                        </p>
                        <p>
                            <button onlink="Validation()">Submit</button>
                            <input type="reset" value="Reset">
                        </p> 
                        <p>
                            Already have an account? <a href="practical18.html">Login</a>
                        </p>
                    </form>
                </fieldset>
            </div>
        
      <div class="Validation">
        <script>
          function validation(event){
            event.preventDefault();
            
            let userN = document.getElementById("name").value.trim();
            let Email = document.getElementById("email").value.trim();
            let add = document.getElementById("address").value.trim();
            let DoB = document.getElementById("dob").value;
            let age = document.getElementById("age").value;
            let passW = document.getElementById("password").value;
            let ph_Num = document.getElementById("phno").value.trim();
            let genderSelected = document.querySelector('input[name="gender"]:checked');

            
            if(userN == "" || Email == "" || add == "" || DoB == "" || age == "" || passW == "" || ph_Num == ""){
              alert("Please don't leave fields empty!");
              return false;
            }

            if(!genderSelected){
              alert("Please select a gender!");
              return false;
            }

            let namePattern = /^[A-Za-z0-9]{3,}$/;
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let passwordPattern = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;
            let numberPattern = /^[0-9]{10}$/;

            if (!namePattern.test(userN)) {
              alert("Username must contain only letters or numbers and at least 3 characters!");
              return false;
            }

            if (!emailPattern.test(Email)) {
              alert("Enter a valid email!");
              return false;
            }

            if (age < 1 || age > 120) {
              alert("Enter a valid age between 1 and 120!");
              return false;
            }

            if (!numberPattern.test(ph_Num)) {
              alert("Enter a valid 10-digit phone number!");
              return false;
            }

            if (!passwordPattern.test(passW)) {
              alert("Password must have at least 8 characters, including:\n- At least one uppercase letter (A-Z)\n- At least one lowercase letter (a-z)\n- At least one number (0-9)\n- At least one special character (!@#$%^&*)");
              return false;
            }

            alert("Form submitted successfully!");
            return true;
          }
        </script>
      </div>
    </div>

    <div class="footer">&copy; Debajit</div>
  </body>
</html>
